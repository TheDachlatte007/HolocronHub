services:
  ai-personal-hub:
    build: .
    container_name: ai-personal-hub
    ports:
      - "8787:8787"
    environment:
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-unknown}
      MARKETAUX_API_KEY: ${MARKETAUX_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
    volumes:
      - holocron_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  holocron_data:
